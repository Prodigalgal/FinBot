apiVersion: apps/v1
kind: Deployment
metadata:
  name: finbot-firecrawl-proxy
  labels:
    app.kubernetes.io/name: finbot-firecrawl-proxy
    app.kubernetes.io/part-of: finbot
    app.kubernetes.io/component: proxy-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: finbot-firecrawl-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finbot-firecrawl-proxy
        app.kubernetes.io/part-of: finbot
        app.kubernetes.io/component: proxy-gateway
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: finbot-dockerhub
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          image: ghcr.io/example/finbot-proxy:latest
          env:
            - name: PROXY_CONTROL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: FINBOT_JAVA_SERVICE_TOKEN
            - name: PROXY_SUBSCRIPTION_URL
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: FIRECRAWL_VLESS_SUBSCRIPTION_URL
            - name: PROXY_MAXIMUM_NODES
              value: "32"
            - name: PROXY_NODE_PORT_START
              value: "10000"
            - name: PROXY_SUBSCRIPTION_REFRESH_SECONDS
              value: "1800"
            - name: PROXY_ALLOW_INSECURE_TLS
              value: "false"
          ports:
            - name: proxy
              containerPort: 8080
            - name: health
              containerPort: 8081
          startupProbe:
            httpGet:
              path: /health/ready
              port: health
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /health/ready
              port: health
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: health
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 384Mi
          volumeMounts:
            - name: runtime
              mountPath: /tmp
      volumes:
        - name: runtime
          emptyDir:
            sizeLimit: 128Mi
---
