apiVersion: apps/v1
kind: Deployment
metadata:
  name: finbot-backend
  labels:
    app.kubernetes.io/name: finbot-backend
    app.kubernetes.io/part-of: finbot
    app.kubernetes.io/component: backend
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: finbot-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finbot-backend
        app.kubernetes.io/part-of: finbot
        app.kubernetes.io/component: backend
    spec:
      terminationGracePeriodSeconds: 45
      automountServiceAccountToken: false
      nodeSelector:
        infra.mnnu/node-class: core-public
      imagePullSecrets:
        - name: finbot-dockerhub
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: finbot-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/example/finbot-backend:latest
          envFrom:
            - configMapRef:
                name: finbot-env
          env:
            - name: FINBOT_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: POSTGRES_PASSWORD
            - name: FINBOT_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: FINBOT_ADMIN_USERNAME
            - name: FINBOT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: FINBOT_ADMIN_PASSWORD
            - name: FINBOT_JAVA_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: FINBOT_JAVA_SERVICE_TOKEN
            - name: FINBOT_QUANT_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: FINBOT_QUANT_SERVICE_TOKEN
            - name: FINBOT_RUNTIME_SECRET_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: RUNTIME_SECRET_MASTER_KEY
            - name: FINBOT_AI_PROVIDER_KEYS_JSON
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: AI_PROVIDER_KEYS_JSON
            - name: FINBOT_EXCHANGE_ACCOUNT_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: EXCHANGE_ACCOUNT_CREDENTIALS_JSON
            - name: FINBOT_INFORMATION_SOURCE_KEYS_JSON
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: INFORMATION_SOURCE_KEYS_JSON
            - name: FINBOT_PROXY_ROUTE_URLS_JSON
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: PROXY_ROUTE_URLS_JSON
            - name: FINBOT_PROXY_GATEWAY_SECRETS_JSON
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: PROXY_GATEWAY_SECRETS_JSON
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finbot-quant
  labels:
    app.kubernetes.io/name: finbot-quant
    app.kubernetes.io/part-of: finbot
    app.kubernetes.io/component: quant
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: finbot-quant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finbot-quant
        app.kubernetes.io/part-of: finbot
        app.kubernetes.io/component: quant
    spec:
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: false
      nodeSelector:
        infra.mnnu/node-class: core-public
      imagePullSecrets:
        - name: finbot-dockerhub
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: finbot-quant
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: quant
          image: ghcr.io/example/finbot-quant:latest
          env:
            - name: FINBOT_QUANT_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: FINBOT_QUANT_SERVICE_TOKEN
            - name: FINBOT_JAVA_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: FINBOT_JAVA_SERVICE_TOKEN
            - name: FINBOT_ARTIFACT_ALLOWED_HOSTS
              value: finbot-backend,finbot-backend.finbot.svc,finbot-backend.finbot.svc.cluster.local
          ports:
            - name: http
              containerPort: 8081
          startupProbe:
            httpGet:
              path: /internal/v1/health
              port: http
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /internal/v1/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /internal/v1/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finbot-web
  labels:
    app.kubernetes.io/name: finbot-web
    app.kubernetes.io/part-of: finbot
    app.kubernetes.io/component: web
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: finbot-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finbot-web
        app.kubernetes.io/part-of: finbot
        app.kubernetes.io/component: web
    spec:
      terminationGracePeriodSeconds: 20
      automountServiceAccountToken: false
      nodeSelector:
        infra.mnnu/node-class: core-public
      imagePullSecrets:
        - name: finbot-dockerhub
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: finbot-web
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/example/finbot-web:latest
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 48Mi
            limits:
              cpu: 250m
              memory: 192Mi
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir:
            sizeLimit: 64Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 16Mi
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finbot-browser-worker
  labels:
    app.kubernetes.io/name: finbot-browser-worker
    app.kubernetes.io/part-of: finbot
    app.kubernetes.io/component: browser-worker
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: finbot-browser-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finbot-browser-worker
        app.kubernetes.io/part-of: finbot
        app.kubernetes.io/component: browser-worker
    spec:
      terminationGracePeriodSeconds: 45
      automountServiceAccountToken: false
      nodeSelector:
        infra.mnnu/node-class: core-public
      imagePullSecrets:
        - name: finbot-dockerhub
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: finbot-browser-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: browser-worker
          image: ghcr.io/example/finbot-browser-worker:latest
          env:
            - name: PORT
              value: "8082"
            - name: FINBOT_BROWSER_WORKER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: finbot-secrets
                  key: FINBOT_JAVA_SERVICE_TOKEN
          ports:
            - name: http
              containerPort: 8082
          startupProbe:
            httpGet:
              path: /internal/v1/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /internal/v1/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /internal/v1/health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: dshm
              mountPath: /dev/shm
            - name: home
              mountPath: /home/finbot
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: home
          emptyDir:
            sizeLimit: 256Mi
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
