apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: finbot-backend
  labels:
    app.kubernetes.io/name: finbot-backend
    environment: prod
    release: prometheus-stack
spec:
  namespaceSelector:
    matchNames: [finbot]
  selector:
    matchLabels:
      app.kubernetes.io/name: finbot-backend
      app.kubernetes.io/component: backend
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: finbot
  labels:
    app.kubernetes.io/name: finbot
    environment: prod
    release: prometheus-stack
spec:
  groups:
    - name: finbot.runtime
      rules:
        - alert: FinBotBackendUnavailable
          expr: up{namespace="finbot", service="finbot-backend"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: FinBot Java backend is unavailable
        - alert: FinBotBackendHighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{namespace="finbot",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{namespace="finbot"}[5m])), 1)
            > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: FinBot backend 5xx rate is above 5 percent
        - alert: FinBotJvmHeapPressure
          expr: |
            sum(jvm_memory_used_bytes{namespace="finbot",area="heap"})
            /
            clamp_min(sum(jvm_memory_max_bytes{namespace="finbot",area="heap"}), 1)
            > 0.90
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: FinBot JVM heap usage is above 90 percent
