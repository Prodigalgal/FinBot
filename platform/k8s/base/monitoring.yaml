apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: finbot-backend
  labels:
    app.kubernetes.io/name: finbot-backend
    environment: prod
    release: prometheus-stack
spec:
  namespaceSelector:
    matchNames: [finbot]
  selector:
    matchLabels:
      app.kubernetes.io/name: finbot-backend
      app.kubernetes.io/component: backend
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: finbot
  labels:
    app.kubernetes.io/name: finbot
    environment: prod
    release: prometheus-stack
spec:
  groups:
    - name: finbot.runtime
      rules:
        - alert: FinBotBackendUnavailable
          expr: up{namespace="finbot", service="finbot-backend"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: FinBot Java backend is unavailable
        - alert: FinBotBackendHighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{namespace="finbot",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{namespace="finbot"}[5m])), 1)
            > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: FinBot backend 5xx rate is above 5 percent
        - alert: FinBotJvmHeapPressure
          expr: |
            sum(jvm_memory_used_bytes{namespace="finbot",area="heap"})
            /
            clamp_min(sum(jvm_memory_max_bytes{namespace="finbot",area="heap"}), 1)
            > 0.90
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: FinBot JVM heap usage is above 90 percent
        - alert: FinBotDeploymentUnavailable
          expr: |
            kube_deployment_status_replicas_available{
              namespace="finbot",
              deployment=~"finbot-(backend|quant|web|firecrawl-proxy|exchange-proxy)"
            } < 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "FinBot deployment {{ $labels.deployment }} has no available replica"
        - alert: FinBotPostgresUnavailable
          expr: |
            kube_statefulset_status_replicas_ready{
              namespace="finbot",
              statefulset="finbot-postgres"
            } < 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: FinBot PostgreSQL has no ready replica
        - alert: FinBotContainerRestartLoop
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="finbot"}[15m]) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "FinBot container {{ $labels.container }} is restarting repeatedly"
        - alert: FinBotPersistentVolumeNearlyFull
          expr: |
            kubelet_volume_stats_available_bytes{
              namespace="finbot",
              persistentvolumeclaim=~"finbot-state|postgres-data-finbot-postgres-0"
            }
            /
            clamp_min(
              kubelet_volume_stats_capacity_bytes{
                namespace="finbot",
                persistentvolumeclaim=~"finbot-state|postgres-data-finbot-postgres-0"
              },
              1
            ) < 0.15
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "FinBot PVC {{ $labels.persistentvolumeclaim }} has less than 15 percent free"
