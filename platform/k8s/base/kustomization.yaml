apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: finbot
resources:
  - namespace.yaml
  - pvc.yaml
  - postgres.yaml
  - migration-jobs.yaml
  - proxy-gateways.yaml
  - searxng.yaml
  - deployments.yaml
  - services.yaml
  - network-policy.yaml
  - monitoring.yaml
configMapGenerator:
  - name: finbot-env
    literals:
      - FINBOT_DATABASE_URL=jdbc:postgresql://finbot-postgres:5432/finbot_v2
      - FINBOT_DATABASE_USERNAME=finbot
      - FINBOT_DATABASE_POOL_SIZE=32
      - FINBOT_DATABASE_MIN_IDLE=4
      - FINBOT_DATABASE_CONNECTION_TIMEOUT_MS=15000
      - FINBOT_INTERNAL_BASE_URL=http://finbot-backend:8080
      - FINBOT_QUANT_SERVICE_URL=http://finbot-quant-service:8081
      - FINBOT_SUB2API_BASE_URL=https://sub2api-direct.mnnu.eu.org/v1
      - FINBOT_GEMINI_BASE_URL=https://sub2api-direct.mnnu.eu.org/v1
      - FINBOT_ALLOW_INSECURE_AI_HTTP=true
      - FINBOT_AUTH_SECURE_COOKIE=true
      - FINBOT_AUTH_CHALLENGE_TTL=PT5M
      - FINBOT_AUTH_POW_DIFFICULTY=3
      - FINBOT_AUTH_SESSION_TTL=PT12H
      - FINBOT_WORKER_POLL_DELAY=PT2S
      - FINBOT_WORKER_LEASE_DURATION=PT30S
      - FINBOT_WORKER_HEARTBEAT_INTERVAL=PT5S
      - FINBOT_SCHEDULER_POLL_DELAY=PT5S
      - FINBOT_TRADING_LEDGER_STALE_AFTER=PT10M
      - FINBOT_CRAWLER_USER_AGENT=FinBot/2.0 (+https://github.com/Prodigalgal/FinBot; contact=finbot@omnnu.xyz)
      - FINBOT_BROWSER_WORKER_URL=http://finbot-browser-worker:8082
      - FINBOT_BROWSER_WORKER_PROXY_URL=http://finbot-web-crawl-proxy:8080
      - FINBOT_BROWSER_WORKER_MAX_CONCURRENT_SOLVES=2
      - FINBOT_BROWSER_WORKER_ACQUIRE_TIMEOUT_MS=5000
      - FINBOT_SEARXNG_ALLOWED_HOSTS=finbot-searxng,finbot-searxng.finbot.svc,finbot-searxng.finbot.svc.cluster.local
generatorOptions:
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
