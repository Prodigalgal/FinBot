apiVersion: v1
kind: Service
metadata:
  name: finbot-web
  labels:
    app.kubernetes.io/name: finbot-web
    app.kubernetes.io/part-of: finbot
spec:
  selector:
    app.kubernetes.io/name: finbot-web
  ports:
    - name: http
      port: 8080
      targetPort: http
