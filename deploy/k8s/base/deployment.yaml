apiVersion: apps/v1
kind: Deployment
metadata:
  name: finbot
  labels:
    app.kubernetes.io/name: finbot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: finbot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finbot
    spec:
      terminationGracePeriodSeconds: 60
      automountServiceAccountToken: false
      nodeSelector:
        infra.mnnu/node-class: core-public
      imagePullSecrets:
        - name: finbot-dockerhub
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: bootstrap-runtime-config
          image: ghcr.io/example/finbot:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              install -d /var/lib/finbot/config /var/lib/finbot/data
              if [ ! -s /var/lib/finbot/config/runtime_config.json ]; then
                cp /bootstrap/runtime_config.json /var/lib/finbot/config/runtime_config.json
              fi
              if [ ! -s /var/lib/finbot/config/proxy_policy.json ]; then
                cp /bootstrap/proxy_policy.json /var/lib/finbot/config/proxy_policy.json
              fi
              if [ ! -s /var/lib/finbot/config/ai_sites.json ]; then
                cp /private-bootstrap/ai_sites.json /var/lib/finbot/config/ai_sites.json
              fi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: state
              mountPath: /var/lib/finbot
            - name: runtime-bootstrap
              mountPath: /bootstrap
              readOnly: true
            - name: private-bootstrap
              mountPath: /private-bootstrap
              readOnly: true
        - name: migrate-sqlite-to-postgres
          image: ghcr.io/example/finbot:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "finbot.cli.migrate_postgres"]
          args:
            - --sqlite-path
            - /var/lib/finbot/data/finbot.sqlite3
            - --report
            - /var/lib/finbot/data/reports/postgresql-migration.json
          envFrom:
            - configMapRef:
                name: finbot-env
            - secretRef:
                name: finbot-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: state
              mountPath: /var/lib/finbot
            - name: migration-tmp
              mountPath: /tmp
      containers:
        - name: web
          image: ghcr.io/example/finbot:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "finbot.cli.serve_web"]
          args:
            - --data-dir
            - /var/lib/finbot/data
            - --host
            - 0.0.0.0
            - --port
            - "8780"
            - --catalog
            - /app/config/source_catalog.example.yml
            - --topics
            - /app/config/topic_watchlists.example.yml
            - --frontend-dist
            - /app/web-ui/dist
          envFrom:
            - configMapRef:
                name: finbot-env
            - secretRef:
                name: finbot-secrets
          ports:
            - name: http
              containerPort: 8780
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: state
              mountPath: /var/lib/finbot
            - name: web-tmp
              mountPath: /tmp
        - name: worker
          image: ghcr.io/example/finbot:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "finbot.cli.serve_worker"]
          args:
            - --data-dir
            - /var/lib/finbot/data
            - --catalog
            - /app/config/source_catalog.example.yml
            - --topics
            - /app/config/topic_watchlists.example.yml
          envFrom:
            - configMapRef:
                name: finbot-env
            - secretRef:
                name: finbot-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: state
              mountPath: /var/lib/finbot
            - name: worker-tmp
              mountPath: /tmp
        - name: metrics
          image: ghcr.io/example/finbot:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "finbot.cli.serve_metrics"]
          args:
            - --data-dir
            - /var/lib/finbot/data
            - --host
            - 0.0.0.0
            - --port
            - "9090"
          envFrom:
            - configMapRef:
                name: finbot-env
            - secretRef:
                name: finbot-secrets
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 48Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: state
              mountPath: /var/lib/finbot
            - name: metrics-tmp
              mountPath: /tmp
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: finbot-state
        - name: runtime-bootstrap
          configMap:
            name: finbot-runtime-bootstrap
        - name: private-bootstrap
          secret:
            secretName: finbot-bootstrap-files
            defaultMode: 0440
        - name: web-tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: worker-tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: migration-tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: metrics-tmp
          emptyDir:
            sizeLimit: 64Mi
