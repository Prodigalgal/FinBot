apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: finbot-web-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: finbot
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 8780
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9090
          protocol: TCP
    - from:
        - podSelector: {}
      ports:
        - port: 8780
          protocol: TCP
