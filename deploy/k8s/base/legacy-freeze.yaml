apiVersion: apps/v1
kind: Deployment
metadata:
  name: finbot
  labels:
    app.kubernetes.io/name: finbot-legacy
    app.kubernetes.io/part-of: finbot
    app.kubernetes.io/component: legacy-runtime
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: finbot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finbot
        app.kubernetes.io/part-of: finbot
        app.kubernetes.io/component: legacy-runtime
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frozen
          image: docker.io/speedproxy/finbot:sha-1422495dba1d58e91b14502204f48898fd3a02e5
          command: ["/bin/sh", "-c", "exit 0"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
