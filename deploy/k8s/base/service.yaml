apiVersion: v1
kind: Service
metadata:
  name: finbot-web
  labels:
    app.kubernetes.io/name: finbot
spec:
  selector:
    app.kubernetes.io/name: finbot
  ports:
    - name: http
      port: 8780
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: finbot-metrics
  labels:
    app.kubernetes.io/name: finbot
    app.kubernetes.io/component: metrics
spec:
  selector:
    app.kubernetes.io/name: finbot
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
