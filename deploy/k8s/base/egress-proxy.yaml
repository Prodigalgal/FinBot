apiVersion: apps/v1
kind: Deployment
metadata:
  name: finbot-egress-proxy
  labels:
    app.kubernetes.io/name: finbot-egress-proxy
    app.kubernetes.io/part-of: finbot
    app.kubernetes.io/component: egress-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: finbot-egress-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finbot-egress-proxy
        app.kubernetes.io/part-of: finbot
        app.kubernetes.io/component: egress-proxy
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        infra.mnnu/location: sg
      imagePullSecrets:
        - name: finbot-dockerhub
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          image: ghcr.io/example/finbot:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              bind_address=""
              for address in $(hostname -i); do
                case "$address" in
                  *:*) ;;
                  *) bind_address="$address"; break ;;
                esac
              done
              test -n "$bind_address"
              cp /etc/tinyproxy/tinyproxy.conf /tmp/tinyproxy.conf
              printf '\nBind %s\n' "$bind_address" >> /tmp/tinyproxy.conf
              exec tinyproxy -d -c /tmp/tinyproxy.conf
          ports:
            - name: proxy
              containerPort: 8888
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/tinyproxy/tinyproxy.conf
              subPath: tinyproxy.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: finbot-egress-proxy-config
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: finbot-egress-proxy
  labels:
    app.kubernetes.io/name: finbot-egress-proxy
    app.kubernetes.io/part-of: finbot
spec:
  selector:
    app.kubernetes.io/name: finbot-egress-proxy
  ports:
    - name: proxy
      port: 8888
      targetPort: proxy
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: finbot-egress-proxies-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: egress-proxy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: finbot
      ports:
        - port: 8888
          protocol: TCP
