  - id: exchange_announcements_bybit
    enabled: true
    tier: T1
    category: exchange_announcements
    mode: firecrawl_scrape
    trust_weight: 0.85
    seed_urls:
      - "https://announcements.bybit.com/"
    poll_interval: 10m
    priority: P1
    asset_scope: ["BTCUSDT", "ETHUSDT", "XAUUSDT", "XAGUSDT"]
    notes: "Exchange listing, delisting, maintenance, product rule changes."

  - id: exchange_announcements_gate
    enabled: true
    tier: T1
    category: exchange_announcements
    mode: firecrawl_scrape
    trust_weight: 0.85
    seed_urls:
      - "https://www.gate.com/announcements"
    poll_interval: 10m
    priority: P1
    asset_scope: ["BTCUSDT", "ETHUSDT", "XAUUSDT", "XAGUSDT", "XTIUSD"]
    notes: "Exchange listing, delisting, maintenance, product rule changes."

  - id: search_firecrawl_global
    enabled: true
    tier: T4
    category: search_discovery
    mode: firecrawl_search
    provider: firecrawl
    trust_weight: 0.45
    poll_interval: 10m
    priority: P1
    max_results: 10
    max_scrape_targets: 5
    budget:
      max_searches_per_hour: 120
      max_scrapes_per_hour: 300
    notes: "Use topic watchlists to generate actual queries."

  - id: social_stocktwits
    enabled: true
    tier: T5
    category: social_sentiment
    mode: firecrawl_scrape
    provider: firecrawl
    trust_weight: 0.25
    seed_urls:
      - "https://stocktwits.com/symbol/BTC.X"
      - "https://stocktwits.com/symbol/ETH.X"
      - "https://stocktwits.com/symbol/SOL.X"
      - "https://stocktwits.com/symbol/QQQ"
      - "https://stocktwits.com/symbol/SPY"
      - "https://stocktwits.com/symbol/NVDA"
      - "https://stocktwits.com/symbol/TSLA"
      - "https://stocktwits.com/symbol/GLD"
      - "https://stocktwits.com/symbol/SLV"
      - "https://stocktwits.com/symbol/USO"
      - "https://stocktwits.com/symbol/XLE"
      - "https://stocktwits.com/symbol/TLT"
      - "https://stocktwits.com/symbol/UUP"
    poll_interval: 15m
    priority: P2
    asset_scope: ["NAS100", "BTCUSDT", "ETHUSDT", "SOLUSDT", "XAUUSD", "XAGUSD", "XTIUSD", "DXY"]
    max_results: 12
    max_scrape_targets: 2
    notes: "Firecrawl-crawled attention signal only; never treat as factual confirmation."

global_limits:
  firecrawl:
    max_search_workers: 5
    max_scrape_workers: 10
    default_timeout_ms: 60000
    max_scrape_targets_per_query: 5
  domain:
    default_same_domain_concurrency: 1
    default_min_interval_seconds: 10
  duplicate:
    url_recrawl_interval: 6h
    title_similarity_window: 6h
    content_hash_window: 30d
