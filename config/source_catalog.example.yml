  - id: official_us_treasury_sanctions
    enabled: true
    tier: T1
    category: geopolitics
    mode: email_subscription_then_firecrawl_scrape
    trust_weight: 0.95
    seed_urls:
      - "https://home.treasury.gov/news/press-releases"
      - "https://ofac.treasury.gov/recent-actions"
    poll_interval: 15m
    priority: P0
    asset_scope: ["XTIUSD", "XAUUSD", "NAS100", "BTCUSDT"]
    notes: "OFAC RSS was retired; use email subscription or recent actions scraping with strict limits."
    crawl_policy:
      max_depth: 1
      max_pages_per_run: 10
      same_domain_concurrency: 1

  - id: official_cme_rss
    enabled: true
    tier: T1
    category: derivatives_exchange
    mode: firecrawl_scrape
    provider: cme
    trust_weight: 0.90
    seed_urls:
      - "https://www.cmegroup.com/rss.html"
    poll_interval: 30m
    priority: P1
    asset_scope: ["XTIUSD", "USOIL", "XAUUSD", "XAGUSD", "BTCUSDT", "DXY"]
    notes: "Use CME RSS landing page first; add exact feed URLs after feed selection."

  - id: official_govinfo_rss
    enabled: true
    tier: T1
    category: policy
    mode: rss_then_firecrawl_scrape
    provider: govinfo
    trust_weight: 0.88
    seed_urls:
      - "https://www.govinfo.gov/feeds"
    poll_interval: 1h
    priority: P2
    asset_scope: ["NAS100", "XAUUSD", "XTIUSD", "BTCUSDT"]
    notes: "Useful for legislation, Federal Register-like policy discovery, and official documents."

  - id: news_yahoo_finance
    enabled: true
    tier: T2
    category: broad_market_news
    mode: provider_api
    provider: yfinance
    trust_weight: 0.75
    poll_interval: 5m
    priority: P1
    asset_scope: ["NAS100", "BTCUSDT", "XAUUSD", "XTIUSD"]

  - id: news_openbb_world
    enabled: true
    tier: T2
    category: broad_market_news
    mode: provider_api
    provider: openbb
    trust_weight: 0.70
    poll_interval: 10m
    priority: P1
    asset_scope: ["NAS100", "BTCUSDT", "ETHUSDT", "XAUUSD", "XAGUSD", "XTIUSD", "DXY"]
    notes: "Use OpenBB as provider abstraction; actual provider may be Biztoc, Tiingo, FMP, Intrinio, etc."

  - id: news_alpha_vantage_sentiment
    enabled: false
    tier: T2
    category: broad_market_news
    mode: provider_api
    provider: alpha_vantage
    trust_weight: 0.65
    poll_interval: 15m
    priority: P2
    asset_scope: ["NAS100", "BTCUSDT", "ETHUSDT", "XAUUSD", "XTIUSD"]
    notes: "Enable when API key and request budget are configured."

  - id: search_gdelt_doc
    enabled: true
    tier: T4
    category: global_news_discovery
    mode: provider_api
    provider: gdelt_doc
    trust_weight: 0.50
    search_queries:
      - "oil"
      - "\"crude oil\""
      - "\"Federal Reserve\" markets"
      - "bitcoin ETF regulation"
    poll_interval: 30m
    priority: P2
    asset_scope: ["XTIUSD", "XAUUSD", "NAS100", "BTCUSDT", "DXY"]
    max_results: 5
    notes: "Low-frequency global media discovery. GDELT is sensitive to concurrent requests; then fetch original pages where possible."

  - id: news_reuters_search
    enabled: true
    tier: T2
    category: broad_market_news
    mode: firecrawl_search_then_scrape
    trust_weight: 0.82
    search_queries:
      - "site:reuters.com oil crude sanctions OPEC latest"
      - "site:reuters.com Nasdaq 100 Fed yields earnings latest"
      - "site:reuters.com gold dollar Fed inflation latest"
      - "site:reuters.com bitcoin ETF SEC regulation latest"
    poll_interval: 10m
    priority: P1
    asset_scope: ["XTIUSD", "XAUUSD", "NAS100", "BTCUSDT"]
    max_results: 10
    max_scrape_targets: 5

  - id: news_ap_search
    enabled: true
    tier: T2
    category: broad_market_news
