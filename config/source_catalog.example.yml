# FinBot source catalog example.
# This file is a configuration sketch, not a guarantee that every URL/API is
# currently enabled. Verify provider terms, auth, rate limits, and endpoint
# availability before production use.

sources:
  - id: market_binance_public
    enabled: false
    tier: T0
    category: market_data
    mode: exchange_public_api
    provider: binance
    trust_weight: 0.90
    poll_interval: 10s
    priority: P0
    asset_scope: ["BTCUSDT", "ETHUSDT", "SOLUSDT"]
    data_types: ["ticker", "kline", "orderbook", "trades"]
    notes: "Optional public market data via Binance market-data endpoints. No trading keys. Disabled by default; enable explicitly when needed."

  - id: market_bybit_public
    enabled: false
    tier: T0
    category: market_data
    mode: exchange_public_api
    provider: bybit
    trust_weight: 0.90
    poll_interval: 10s
    priority: P0
    asset_scope: ["BTCUSDT", "ETHUSDT", "XAUUSDT", "XAGUSDT", "NAS100", "XTIUSD"]
    data_types: ["ticker", "kline", "orderbook", "trades", "funding"]
    notes: "Optional public market data only. No trading keys. Disabled by default because Bybit may enforce stricter IP/region policy."

  - id: market_gate_public
    enabled: true
    tier: T0
    category: market_data
    mode: exchange_public_api
    provider: gate
    trust_weight: 0.90
    poll_interval: 10s
    priority: P0
    asset_scope: ["BTC_USDT", "ETH_USDT", "XAU_USDT", "XAG_USDT", "XTIUSD"]
    data_types: ["ticker", "kline", "orderbook", "trades"]
    notes: "Default public market data provider. Verify CFD symbols separately before enabling."

  - id: official_eia_weekly_petroleum
    enabled: true
    tier: T1
    category: energy
    mode: firecrawl_scrape
    trust_weight: 0.95
    seed_urls:
      - "https://www.eia.gov/petroleum/supply/weekly/"
    poll_interval: 30m
    priority: P0
    asset_scope: ["XTIUSD", "USOIL", "BZUSDT"]
    crawl_policy:
      max_depth: 0
      max_pages_per_run: 1
      same_domain_concurrency: 1

  - id: official_opec_news
    enabled: true
    tier: T1
    category: energy
    mode: firecrawl_scrape
    trust_weight: 0.95
    seed_urls:
      - "https://www.opec.org/opec_web/en/press_room/28.htm"
    poll_interval: 30m
    priority: P0
    asset_scope: ["XTIUSD", "USOIL", "BZUSDT"]
    crawl_policy:
      max_depth: 1
      max_pages_per_run: 5
      same_domain_concurrency: 1

  - id: official_federal_reserve
    enabled: true
    tier: T1
    category: macro
    mode: rss_then_firecrawl_scrape
    trust_weight: 0.95
    feed_urls:
      - "https://www.federalreserve.gov/feeds/press_all.xml"
    seed_urls:
      - "https://www.federalreserve.gov/newsevents/pressreleases.htm"
    poll_interval: 15m
    priority: P0
    asset_scope: ["NAS100", "XAUUSD", "XAGUSD", "BTCUSDT", "DXY"]
    crawl_policy:
      max_depth: 1
      max_pages_per_run: 10
      same_domain_concurrency: 1

  - id: official_fred_api
    enabled: true
    tier: T1
    category: macro_data
    mode: structured_api
    provider: fred
    trust_weight: 0.95
    poll_interval: 30m
    priority: P0
    asset_scope: ["NAS100", "XAUUSD", "XAGUSD", "BTCUSDT", "DXY"]
    data_series:
      - "FEDFUNDS"
      - "DGS10"
      - "DGS2"
      - "T10YIE"
      - "DFF"
      - "DTWEXBGS"
    notes: "Requires FRED API key for production use."

  - id: official_bls_api
    enabled: true
    tier: T1
    category: macro_data
    mode: structured_api
    provider: bls
    trust_weight: 0.95
    poll_interval: 1h
    priority: P0
    asset_scope: ["NAS100", "XAUUSD", "XAGUSD", "BTCUSDT", "DXY"]
    data_series:
      - "CPI"
      - "PAYEMS"
      - "UNRATE"
      - "CES"
      - "PPI"
    notes: "Use exact BLS series IDs in implementation."

  - id: official_bea_api
    enabled: true
    tier: T1
    category: macro_data
    mode: structured_api
    provider: bea
    trust_weight: 0.95
    poll_interval: 1h
    priority: P0
    asset_scope: ["NAS100", "XAUUSD", "XAGUSD", "BTCUSDT", "DXY"]
    datasets:
      - "NIPA"
      - "GDP"
      - "PersonalIncome"
      - "InternationalTransactions"
    notes: "Requires BEA API key for production use."

  - id: official_ecb_rss
    enabled: true
    tier: T1
    category: macro
    mode: rss_then_firecrawl_scrape
    provider: ecb
    trust_weight: 0.95
    feed_urls:
      - "https://www.ecb.europa.eu/rss/press.html"
      - "https://www.ecb.europa.eu/rss/speeches.html"
    seed_urls:
      - "https://www.ecb.europa.eu/home/html/rss.en.html"
    poll_interval: 15m
    priority: P0
    asset_scope: ["DXY", "EURUSD", "NAS100", "XAUUSD", "BTCUSDT"]

  - id: official_state_department_rss
    enabled: true
    tier: T1
    category: geopolitics
    mode: rss_then_firecrawl_scrape
    provider: state_department
    trust_weight: 0.90
    seed_urls:
      - "https://www.state.gov/rss-feeds"
    poll_interval: 15m
    priority: P0
    asset_scope: ["XTIUSD", "XAUUSD", "NAS100", "BTCUSDT", "DXY"]
    notes: "Use the current RSS URLs listed by the source page."

  - id: official_defense_rss
    enabled: true
    tier: T1
    category: geopolitics
    mode: firecrawl_scrape
    provider: us_defense
    trust_weight: 0.90
    seed_urls:
      - "https://www.defense.gov/News/Releases/"
    poll_interval: 15m
    priority: P0
    asset_scope: ["XTIUSD", "XAUUSD", "NAS100", "BTCUSDT"]
    notes: "RSS path may return 403; use official releases page scraping as fallback."

  - id: official_sec_edgar_company_filings
    enabled: false
    tier: T1
    category: equities
    mode: structured_api
    provider: sec_edgar
    trust_weight: 0.95
    poll_interval: 15m
    priority: P1
    asset_scope: ["NAS100"]
    notes: "Enable when company CIK list is prepared."

  - id: official_white_house
    enabled: true
    tier: T1
    category: geopolitics
    mode: firecrawl_scrape
    trust_weight: 0.90
    seed_urls:
