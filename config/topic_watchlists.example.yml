# FinBot topic watchlist example.
# These topics generate search jobs and help map collected information to assets.

topics:
  oil_geopolitics:
    enabled: true
    priority: P1
    assets: ["XTIUSD", "USOIL", "BZUSDT", "XAUUSD", "NAS100"]
    base_queries:
      - "crude oil Iran sanctions tanker latest"
      - "WTI Brent Middle East conflict oil supply"
      - "oil prices jump war supply disruption"
      - "OPEC production cut crude oil latest"
      - "EIA crude oil inventory draw build latest"
    event_keywords:
      - attack
      - sanctions
      - tanker
      - strait
      - ceasefire
      - missile
      - refinery
      - inventory
      - draw
      - build
      - production cut
    positive_oil_bias_events:
      - supply disruption
      - sanctions escalation
      - inventory draw
      - OPEC cut
      - tanker attack
    negative_oil_bias_events:
      - ceasefire
      - inventory build
      - demand slowdown
      - production increase

  gold_macro_risk:
    enabled: true
    priority: P1
    assets: ["XAUUSD", "XAGUSD", "DXY", "NAS100"]
    base_queries:
      - "gold price Fed real yields dollar inflation latest"
      - "gold safe haven war sanctions latest"
      - "US real yields dollar gold price latest"
      - "central bank gold purchases latest"
    event_keywords:
      - Fed
      - inflation
      - real yields
      - dollar
      - safe haven
      - war
      - sanctions
      - central bank

  nas100_macro_tech:
    enabled: true
    priority: P1
    assets: ["NAS100", "BTCUSDT", "XAUUSD", "DXY"]
    base_queries:
      - "Nasdaq 100 Fed yields tech stocks latest"
      - "Nvidia Apple Microsoft earnings AI chip latest"
      - "US CPI Fed rate cuts Nasdaq latest"
      - "Treasury yields Nasdaq tech selloff rally"
    event_keywords:
      - Fed
      - CPI
      - rate cut
      - rate hike
      - yields
      - earnings
      - AI chips
      - guidance
      - antitrust
      - export controls

  crypto_regulation_liquidity:
    enabled: true
    priority: P1
    assets: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "NAS100"]
    base_queries:
      - "Bitcoin ETF SEC regulation latest"
      - "crypto exchange hack liquidation latest"
      - "Ethereum ETF staking SEC latest"
      - "Bitcoin funding rate open interest liquidation latest"
    event_keywords:
      - ETF
      - SEC
      - CFTC
      - hack
      - liquidation
      - exchange outage
      - lawsuit
      - approval
      - rejection
      - inflow
      - outflow

  macro_calendar:
    enabled: true
    priority: P0
    assets: ["NAS100", "XAUUSD", "XAGUSD", "BTCUSDT", "XTIUSD", "DXY"]
    base_queries:
      - "US CPI release latest market reaction"
      - "FOMC decision latest market reaction"
      - "US nonfarm payrolls latest market reaction"
      - "PCE inflation latest Fed market reaction"
    event_keywords:
      - CPI
      - FOMC
      - payrolls
      - PCE
      - GDP
      - unemployment
      - retail sales
      - Fed minutes

query_expansion_rules:
  include_time_words:
    - latest
    - breaking
    - today
    - live
    - update
  include_market_words:
    - price
    - futures
    - market reaction
    - volatility
  max_queries_per_topic_per_run: 8
  freshness_window: 24h
