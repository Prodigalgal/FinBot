components:
  securitySchemes:
    adminSession:
      type: apiKey
      in: cookie
      name: FINBOT_SESSION
    adminApiToken:
      type: http
      scheme: bearer
      bearerFormat: finbot_pat
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 200
    CsrfToken:
      name: X-XSRF-TOKEN
      in: header
      required: true
      schema:
        type: string
        minLength: 1
    SourceId:
      name: sourceId
      in: path
      required: true
      schema:
        type: string
        pattern: ^source_[a-z0-9_-]{4,72}$
    ExpectedVersion:
      name: expectedVersion
      in: query
      required: true
      schema:
        type: integer
        format: int64
        minimum: 0
    RunIdPath:
      name: runId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/RunId"
    WorkflowVersionPath:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        pattern: ^workflowversion_[a-z0-9_-]{4,60}$
  responses:
    AiProvider:
      description: AI provider profile with masked credential state and usage references.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AiProvider"
    AiModel:
      description: Model profile owned by one AI provider.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AiModel"
    Problem:
      description: RFC 9457 problem with a stable FinBot business code.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
  schemas:
    AdminApiToken:
      type: object
      additionalProperties: false
      required:
        - tokenId
        - displayName
        - fingerprint
        - username
        - status
        - expiresAt
        - lastUsedAt
        - revokedAt
        - createdAt
        - updatedAt
        - version
      properties:
        tokenId:
          type: string
          pattern: ^apitoken_[a-z0-9_-]{4,71}$
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        fingerprint:
          type: string
          pattern: ^[0-9a-f]{16}$
        username:
          type: string
          minLength: 1
          maxLength: 80
        status:
          type: string
          enum:
            - ACTIVE
            - EXPIRED
            - REVOKED
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
        lastUsedAt:
          type:
            - string
            - "null"
          format: date-time
        revokedAt:
          type:
            - string
            - "null"
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
          minimum: 0
    CreateAdminApiTokenRequest:
      type: object
      additionalProperties: false
      required:
        - displayName
        - expiresInDays
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        expiresInDays:
          type:
            - integer
            - "null"
          minimum: 1
          maximum: 3650
    CreatedAdminApiToken:
      type: object
      additionalProperties: false
      required:
        - token
        - rawToken
      properties:
        token:
          $ref: "#/components/schemas/AdminApiToken"
        rawToken:
          type: string
          pattern: ^finbot_pat_[A-Za-z0-9_-]{43}$
          readOnly: true
    SourceDefinition:
      type: object
      required:
        - displayName
        - mode
        - tier
        - category
        - trustWeight
        - pollIntervalSeconds
        - priority
        - assetScope
        - feedUrls
        - seedUrls
        - searchQueries
        - credentialSupported
        - maximumResults
        - maximumScrapeTargets
        - enabled
        - crawlerHeaderProfileId
        - aiWebSearchBinding
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 160
        mode:
          type: string
          enum:
            - RSS
            - HTML_DOCUMENT
            - SEARCH_DISCOVERY
            - FIRECRAWL_SCRAPE
            - FIRECRAWL_SEARCH
            - FIRECRAWL_SEARCH_THEN_SCRAPE
            - JSON_API
            - SITEMAP
            - AI_WEB_SEARCH
            - EXCHANGE_PUBLIC_API
        tier:
          type: string
          enum:
            - T0
            - T1
            - T2
            - T3
            - T4
            - T5
        category:
          type: string
          minLength: 1
          maxLength: 80
        provider:
          type:
            - string
            - "null"
          maxLength: 80
        trustWeight:
          type: number
          minimum: 0
          maximum: 1
        pollIntervalSeconds:
          type: integer
          minimum: 10
          maximum: 2592000
        priority:
          type: string
          enum:
            - P0
            - P1
            - P2
            - P3
        assetScope:
          type: array
          maxItems: 64
          items:
            type: string
            minLength: 1
            maxLength: 32
        feedUrls:
          $ref: "#/components/schemas/SourceUrlList"
        seedUrls:
          $ref: "#/components/schemas/SourceUrlList"
        searchQueries:
          type: array
          maxItems: 32
          items:
            type: string
            minLength: 1
            maxLength: 1000
        endpointBaseUrl:
          type:
            - string
            - "null"
          format: uri
        credentialSupported:
          type: boolean
        outboundRoute:
          type:
            - string
            - "null"
          enum:
            - FIRECRAWL
            - WEB_CRAWL
            - EXCHANGE_GATE
            - EXCHANGE_BYBIT
            - PUBLIC_DATA
            - null
        crawlerHeaderProfileId:
          type: string
          pattern: ^header_[a-z0-9_-]{4,72}$
        maximumResults:
          type: integer
          minimum: 1
          maximum: 100
        maximumScrapeTargets:
          type: integer
          minimum: 0
          maximum: 20
        enabled:
          type: boolean
        aiWebSearchBinding:
          anyOf:
            - $ref: "#/components/schemas/AiWebSearchBinding"
            - type: "null"
    AiWebSearchBinding:
      type: object
      additionalProperties: false
      required:
        - providerProfileId
        - modelName
        - reasoningEffort
        - tool
      properties:
        providerProfileId:
          type: string
          pattern: ^provider_[a-z0-9_-]{4,71}$
        modelName:
          type: string
          minLength: 1
          maxLength: 160
        reasoningEffort:
          type: string
          enum:
            - PROVIDER_DEFAULT
            - NONE
            - MINIMAL
            - LOW
            - MEDIUM
