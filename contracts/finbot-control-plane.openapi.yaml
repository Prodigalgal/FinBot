openapi: 3.1.0
info:
  title: FinBot Administrator Control Plane API
  version: 2.0.0
  description: Authenticated Java control-plane contract for research, workflows, diagnostics, and paper-trading audit.
servers:
  - url: /api/v2
security:
  - adminSession: []
paths:
  /agent-roles:
    get:
      operationId: getAgentRoles
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
    post:
      operationId: postAgentRoles
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
  /agent-roles/{roleTemplateId}:
    delete:
      operationId: deleteAgentRolesRoleTemplateId
      responses:
        "204":
          description: Operation completed without a response body.
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: roleTemplateId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
    put:
      operationId: putAgentRolesRoleTemplateId
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: roleTemplateId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /ai-experiments:
    get:
      operationId: listAiExperiments
      responses:
        "200":
          $ref: "#/components/responses/JsonArray"
    post:
      operationId: createAiExperiment
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "201":
          $ref: "#/components/responses/AiModel"
  /ai-experiments/{experimentId}:
    put:
      operationId: putAiExperimentsExperimentId
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: experimentId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /analysis/forecasts:
    get:
      operationId: listResearchForecasts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          $ref: "#/components/responses/JsonArray"
  /analysis/market-runs:
    post:
      operationId: startMarketAnalysis
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketAnalysisCommand"
      responses:
        "202":
          $ref: "#/components/responses/JsonObject"
  /analysis/market-runs/{runId}/forecast:
    get:
      operationId: getResearchForecast
      parameters:
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        "404":
          $ref: "#/components/responses/Problem"
  /auth/challenge:
    get:
      operationId: getAuthChallenge
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      security: []
  /auth/login:
    post:
      operationId: postAuthLogin
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      security: []
  /auth/logout:
    post:
      operationId: postAuthLogout
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
  /auth/status:
    get:
      operationId: getAuthStatus
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /autonomous:
    get:
      operationId: getAutonomousResearchStatus
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
  /autonomous/runs:
    post:
      operationId: triggerAutonomousResearch
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                requestSummary:
                  type:
                    - string
                    - "null"
                  maxLength: 1000
      responses:
        "202":
          $ref: "#/components/responses/JsonObject"
        "409":
          $ref: "#/components/responses/Problem"
  /configuration:
    get:
      operationId: getConfiguration
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /configuration/models:
    post:
      operationId: postConfigurationModels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAiModelRequest"
      responses:
        "201":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
  /configuration/models/{modelProfileId}:
    put:
      operationId: putConfigurationModelsModelProfileId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAiModelRequest"
      responses:
        "200":
          $ref: "#/components/responses/AiModel"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: modelProfileId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /configuration/providers:
    post:
      operationId: postConfigurationProviders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAiProviderRequest"
      responses:
        "201":
          $ref: "#/components/responses/AiProvider"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
  /configuration/providers/{profileId}:
    delete:
      operationId: deleteConfigurationProvidersProfileId
      responses:
        "204":
          description: Operation completed without a response body.
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
        - name: expectedVersion
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 0
        - $ref: "#/components/parameters/CsrfToken"
    put:
      operationId: putConfigurationProvidersProfileId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAiProviderRequest"
      responses:
        "200":
          $ref: "#/components/responses/AiProvider"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /configuration/providers/{profileId}/probe:
    post:
      operationId: postConfigurationProvidersProfileIdProbe
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /configuration/providers/probe:
    post:
      operationId: postConfigurationProvidersProbe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProbeAiProviderRequest"
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
  /configuration/settings/{settingKey}:
    put:
      operationId: putConfigurationSettingsSettingKey
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: settingKey
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /evidence/documents:
    get:
      operationId: getEvidenceDocuments
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /exchanges/capabilities:
    get:
      operationId: listExchangeCapabilities
      description: Exact market-data and paper-order environments supported by each venue market type.
      responses:
        "200":
          description: Exchange capability matrix. LIVE never appears in orderExecutionEnvironments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExchangeCapability"
  /ingestion/workspace:
    get:
      operationId: getIngestionWorkspace
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /network:
    get:
      operationId: getNetwork
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /network/diagnostics:
    get:
      operationId: listNetworkDiagnostics
      responses:
        "200":
          $ref: "#/components/responses/JsonArray"
    post:
      operationId: startNetworkDiagnostics
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                routes:
                  type: array
                  uniqueItems: true
                  items:
                    type: string
                    enum:
                      - FIRECRAWL
                      - EXCHANGE_GATE
                      - EXCHANGE_BYBIT
                      - PUBLIC_DATA
      responses:
        "202":
          $ref: "#/components/responses/JsonArray"
  /network/proxy-gateways/{gatewayId}:
    get:
      operationId: getNetworkProxyGatewayRuntimeStatus
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: gatewayId
          in: path
          required: true
          schema:
            type: string
    put:
      operationId: putNetworkProxyGatewaysGatewayId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyGatewayUpdateRequest"
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: gatewayId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /network/proxy-gateways/{gatewayId}/reload:
    post:
      operationId: postNetworkProxyGatewaysGatewayIdReload
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: gatewayId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /operations:
    get:
      operationId: getOperations
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /operations/events:
    get:
      operationId: streamOperationsSnapshots
      parameters:
        - name: Last-Event-ID
          in: header
          schema:
            type: string
            pattern: ^[0-9]+$
      responses:
        "200":
          description: Recoverable operations snapshot stream.
          content:
            text/event-stream:
              schema:
                type: string
  /operations/schedules/{scheduleId}:
    put:
      operationId: putOperationsSchedulesScheduleId
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: scheduleId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /operations/tasks:
    get:
      operationId: getOperationsTasks
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /operations/tasks/{taskId}:
    get:
      operationId: getOperationsTasksTaskId
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
  /products:
    get:
      operationId: getProducts
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /products/{productId}:
    get:
      operationId: getProductsProductId
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
  /products/catalog-sync-runs:
    get:
      operationId: listProductCatalogSyncRuns
      responses:
        "200":
          $ref: "#/components/responses/JsonArray"
  /products/catalog-sync/{exchange}/{marketType}:
    post:
      operationId: synchronizeProductCatalog
      parameters:
        - name: exchange
          in: path
          required: true
          schema:
            type: string
            enum:
              - GATE
              - BYBIT
        - name: marketType
          in: path
          required: true
          schema:
            type: string
            enum:
              - SPOT
              - LINEAR_PERPETUAL
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "202":
          $ref: "#/components/responses/JsonObject"
  /quant/previews:
    post:
      operationId: previewTradeRisk
      description: Deterministic and side-effect-free. It never creates an OMS order or exchange request.
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeRiskPreviewCommand"
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
  /quant/runs:
    get:
      operationId: getQuantRuns
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /readiness:
    get:
      operationId: getPlatformReadiness
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
  /reports:
    get:
      operationId: getOperationsReport
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
  /research/cases/by-run/{runId}:
    get:
      operationId: getResearchCaseByRunId
      parameters:
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Shared evidence and live/paper branch state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchCase"
        "404":
          $ref: "#/components/responses/Problem"
  /research/history:
    get:
      operationId: getResearchHistory
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /research/history/{runId}:
    get:
      operationId: getResearchHistoryRunId
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
  /research/history/{runId}/replay:
    post:
      operationId: postResearchHistoryRunIdReplay
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /research/history/{runId}/resume:
    post:
      operationId: postResearchHistoryRunIdResume
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /research/instant:
    post:
      operationId: postResearchInstant
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
  /research/review/{runId}/feedback:
    put:
      operationId: putResearchReviewRunIdFeedback
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /research/review/compare:
    get:
      operationId: getResearchReviewCompare
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /research/review/feedback:
    get:
      operationId: getResearchReviewFeedback
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /runtime-secrets/{scope}/{targetId}/{secretName}:
    delete:
      operationId: deleteRuntimeSecretsScopeTargetIdSecretName
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeSecretClearRequest"
      responses:
        "200":
          description: Effective secret status after clearing the database override.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSecretStatus"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
        - name: targetId
          in: path
          required: true
          schema:
            type: string
        - name: secretName
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
    put:
      operationId: putRuntimeSecretsScopeTargetIdSecretName
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeSecretPutRequest"
      responses:
        "200":
          description: Effective secret status after storing the encrypted override.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSecretStatus"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
        - name: targetId
          in: path
          required: true
          schema:
            type: string
        - name: secretName
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /setup-profiles:
    get:
      operationId: getSetupProfiles
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /setup-profiles/{profileId}/apply:
    post:
      operationId: applySetupProfile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
            enum:
              - RECOMMENDED
              - ECONOMY
              - DEEP_RESEARCH
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
  /setup-profiles/{profileId}/preview:
    get:
      operationId: getSetupProfilesProfileIdPreview
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
  /setup-profiles/history:
    get:
      operationId: getSetupProfilesHistory
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
  /sources:
    get:
      operationId: getSources
      parameters:
        - name: enabledOnly
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Active information sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceResponse"
        default:
          $ref: "#/components/responses/Problem"
    post:
      operationId: createInformationSource
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceMutationRequest"
      responses:
        "201":
          description: Source created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
        default:
          $ref: "#/components/responses/Problem"
  /sources/{sourceId}:
    delete:
      operationId: deleteInformationSource
      parameters:
        - $ref: "#/components/parameters/SourceId"
        - $ref: "#/components/parameters/ExpectedVersion"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "204":
          description: Source archived while preserving history
        "409":
          $ref: "#/components/responses/Problem"
    put:
      operationId: updateInformationSource
      parameters:
        - $ref: "#/components/parameters/SourceId"
        - $ref: "#/components/parameters/ExpectedVersion"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceMutationRequest"
      responses:
        "200":
          description: Source updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
        "409":
          $ref: "#/components/responses/Problem"
  /sources/{sourceId}/collect:
    post:
      operationId: postSourcesSourceIdCollect
      responses:
        "202":
          $ref: "#/components/responses/JsonObject"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
  /sources/{sourceId}/status:
    put:
      operationId: setInformationSourceStatus
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
            pattern: ^source_[a-z0-9_-]{4,72}$
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedEnabledCommand"
      responses:
        "200":
          $ref: "#/components/responses/JsonObject"
        "409":
          $ref: "#/components/responses/Problem"
  /sources/{sourceId}/test:
    post:
      operationId: testInformationSource
      parameters:
        - $ref: "#/components/parameters/SourceId"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
