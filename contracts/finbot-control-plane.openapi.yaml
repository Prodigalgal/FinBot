components:
  securitySchemes:
    adminSession:
      type: apiKey
      in: cookie
      name: FINBOT_SESSION
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 200
    CsrfToken:
      name: X-XSRF-TOKEN
      in: header
      required: true
      schema:
        type: string
        minLength: 1
    SourceId:
      name: sourceId
      in: path
      required: true
      schema:
        type: string
        pattern: ^source_[a-z0-9_-]{4,72}$
    ExpectedVersion:
      name: expectedVersion
      in: query
      required: true
      schema:
        type: integer
        format: int64
        minimum: 0
    RunIdPath:
      name: runId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/RunId"
    WorkflowVersionPath:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        pattern: ^workflowversion_[a-z0-9_-]{4,60}$
  responses:
    AiProvider:
      description: AI provider profile with masked credential state and usage references.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AiProvider"
    AiModel:
      description: Model profile owned by one AI provider.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AiModel"
    JsonObject:
      description: Successful structured response.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    JsonArray:
      description: Successful structured collection.
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              additionalProperties: true
    Problem:
      description: RFC 9457 problem with a stable FinBot business code.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
  schemas:
    SourceDefinition:
      type: object
      required:
        - displayName
        - mode
        - tier
        - category
        - trustWeight
        - pollIntervalSeconds
        - priority
        - assetScope
        - feedUrls
        - seedUrls
        - searchQueries
        - credentialSupported
        - maximumResults
        - maximumScrapeTargets
        - enabled
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 160
        mode:
          type: string
          enum:
            - RSS
            - FIRECRAWL_SCRAPE
            - FIRECRAWL_SEARCH
            - FIRECRAWL_SEARCH_THEN_SCRAPE
            - STRUCTURED_API
            - EXCHANGE_PUBLIC_API
        tier:
          type: string
          enum:
            - T0
            - T1
            - T2
            - T3
            - T4
            - T5
        category:
          type: string
          minLength: 1
          maxLength: 80
        provider:
          type:
            - string
            - "null"
          maxLength: 80
        trustWeight:
          type: number
          minimum: 0
          maximum: 1
        pollIntervalSeconds:
          type: integer
          minimum: 10
          maximum: 2592000
        priority:
          type: string
          enum:
            - P0
            - P1
            - P2
            - P3
        assetScope:
          type: array
          maxItems: 64
          items:
            type: string
            minLength: 1
            maxLength: 32
        feedUrls:
          $ref: "#/components/schemas/SourceUrlList"
        seedUrls:
          $ref: "#/components/schemas/SourceUrlList"
        searchQueries:
          type: array
          maxItems: 32
          items:
            type: string
            minLength: 1
            maxLength: 1000
        endpointBaseUrl:
          type:
            - string
            - "null"
          format: uri
        credentialSupported:
          type: boolean
        outboundRoute:
          type:
            - string
            - "null"
          enum:
            - FIRECRAWL
            - EXCHANGE_GATE
            - EXCHANGE_BYBIT
            - PUBLIC_DATA
            - null
        maximumResults:
          type: integer
          minimum: 1
          maximum: 100
        maximumScrapeTargets:
          type: integer
          minimum: 0
          maximum: 20
        enabled:
          type: boolean
    SourceMutationRequest:
      allOf:
        - $ref: "#/components/schemas/SourceDefinition"
      unevaluatedProperties: false
    SourceResponse:
      allOf:
        - $ref: "#/components/schemas/SourceDefinition"
        - type: object
          required:
            - sourceId
            - version
          properties:
            sourceId:
              type: string
              pattern: ^source_[a-z0-9_-]{4,72}$
            version:
              type: integer
              format: int64
              minimum: 0
      unevaluatedProperties: false
    SourceUrlList:
      type: array
      maxItems: 32
      items:
        type: string
        format: uri
    SourceTestResponse:
      type: object
      additionalProperties: false
      required:
        - collectionId
        - sourceId
        - status
        - fetchedCount
        - insertedCount
        - duplicateCount
      properties:
        collectionId:
          type: string
        sourceId:
          type: string
        status:
          type: string
          enum:
            - COMPLETED
            - PARTIAL
            - BLOCKED
            - FAILED
        fetchedCount:
          type: integer
          minimum: 0
        insertedCount:
          type: integer
          minimum: 0
        duplicateCount:
          type: integer
          minimum: 0
        errorCode:
          type:
            - string
            - "null"
        errorMessage:
          type:
            - string
            - "null"
    AiProvider:
      type: object
      additionalProperties: false
      required:
        - profileId
        - displayName
        - protocol
        - reasoningParameterStyle
        - baseUrl
        - baseUrlConfigured
        - apiKeyConfigured
        - credentialSource
        - credentialFingerprint
        - credentialVersion
        - credentialUpdatedAt
        - enabled
        - connectTimeoutSeconds
        - requestTimeoutSeconds
        - workflowNodeUsageCount
        - roleTemplateUsageCount
        - executionStageUsageCount
        - totalUsageCount
        - version
        - updatedAt
      properties:
        profileId:
          type: string
          maxLength: 80
        displayName:
          type: string
          maxLength: 120
        protocol:
          type: string
          enum:
            - CHAT
            - RESPONSES
        reasoningParameterStyle:
          type: string
          enum:
            - NONE
            - FLAT
            - NESTED
        baseUrl:
          type:
            - string
            - "null"
          format: uri
          maxLength: 1000
        baseUrlConfigured:
          type: boolean
        apiKeyConfigured:
          type: boolean
        credentialSource:
          type: string
          enum:
            - DATABASE_OVERRIDE
            - ENVIRONMENT_FALLBACK
            - UNCONFIGURED
        credentialFingerprint:
          type:
            - string
            - "null"
          pattern: ^[0-9a-f]{16}$
        credentialVersion:
          type: integer
          format: int64
          minimum: 0
        credentialUpdatedAt:
          type:
            - string
            - "null"
          format: date-time
        enabled:
          type: boolean
        connectTimeoutSeconds:
          type: integer
          minimum: 1
          maximum: 60
        requestTimeoutSeconds:
          type: integer
          minimum: 5
          maximum: 1800
        workflowNodeUsageCount:
          type: integer
          format: int64
          minimum: 0
        roleTemplateUsageCount:
          type: integer
          format: int64
          minimum: 0
        executionStageUsageCount:
          type: integer
          format: int64
          minimum: 0
        totalUsageCount:
          type: integer
          format: int64
          minimum: 0
        version:
          type: integer
          format: int64
          minimum: 0
        updatedAt:
          type: string
          format: date-time
    AiModel:
      type: object
      additionalProperties: false
      required:
        - modelProfileId
        - providerProfileId
        - modelName
        - defaultReasoningEffort
        - maximumReasoningEffort
        - inputUsdPerMillion
        - outputUsdPerMillion
        - enabled
        - version
        - updatedAt
      properties:
        modelProfileId:
          type: string
          maxLength: 100
        providerProfileId:
          type: string
          maxLength: 80
        modelName:
          type: string
          maxLength: 160
        defaultReasoningEffort:
          $ref: "#/components/schemas/ReasoningEffort"
        maximumReasoningEffort:
          $ref: "#/components/schemas/ReasoningEffort"
        inputUsdPerMillion:
          type: number
          minimum: 0
        outputUsdPerMillion:
          type: number
          minimum: 0
        enabled:
          type: boolean
        version:
          type: integer
          format: int64
          minimum: 0
        updatedAt:
          type: string
          format: date-time
    CreateAiProviderRequest:
      type: object
      additionalProperties: false
      required:
        - displayName
        - protocol
        - reasoningParameterStyle
        - baseUrl
        - enabled
        - connectTimeoutSeconds
        - requestTimeoutSeconds
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        protocol:
          type: string
          enum:
            - CHAT
            - RESPONSES
        reasoningParameterStyle:
          type: string
          enum:
            - NONE
            - FLAT
            - NESTED
        baseUrl:
          type: string
          format: uri
          maxLength: 1000
        enabled:
          type: boolean
        connectTimeoutSeconds:
          type: integer
          minimum: 1
          maximum: 60
        requestTimeoutSeconds:
          type: integer
          minimum: 5
          maximum: 1800
    ProbeAiProviderRequest:
      type: object
      additionalProperties: false
      required:
        - baseUrl
        - apiKey
        - requestTimeoutSeconds
      properties:
        baseUrl:
          type: string
          format: uri
          maxLength: 1000
        apiKey:
          type: string
          minLength: 8
          maxLength: 16384
          writeOnly: true
        requestTimeoutSeconds:
          type: integer
          minimum: 5
          maximum: 1800
    CreateAiModelRequest:
      type: object
      additionalProperties: false
      required:
        - providerProfileId
        - modelName
        - defaultReasoningEffort
        - maximumReasoningEffort
        - inputUsdPerMillion
        - outputUsdPerMillion
        - enabled
      properties:
        providerProfileId:
          type: string
          maxLength: 80
        modelName:
          type: string
          minLength: 1
          maxLength: 160
        defaultReasoningEffort:
          $ref: "#/components/schemas/ReasoningEffort"
        maximumReasoningEffort:
          $ref: "#/components/schemas/ReasoningEffort"
        inputUsdPerMillion:
          type: number
          minimum: 0
        outputUsdPerMillion:
          type: number
          minimum: 0
        enabled:
          type: boolean
    UpdateAiProviderRequest:
      type: object
      additionalProperties: false
      required:
        - displayName
        - protocol
        - reasoningParameterStyle
        - baseUrl
        - enabled
        - connectTimeoutSeconds
        - requestTimeoutSeconds
        - expectedVersion
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        protocol:
          type: string
          enum:
            - CHAT
            - RESPONSES
        reasoningParameterStyle:
          type: string
          enum:
            - NONE
            - FLAT
            - NESTED
        baseUrl:
          type: string
          format: uri
          maxLength: 1000
        enabled:
          type: boolean
        connectTimeoutSeconds:
          type: integer
          minimum: 1
          maximum: 60
        requestTimeoutSeconds:
          type: integer
          minimum: 5
          maximum: 1800
        expectedVersion:
          type: integer
          format: int64
          minimum: 0
    UpdateAiModelRequest:
      type: object
      additionalProperties: false
      required:
        - defaultReasoningEffort
        - maximumReasoningEffort
        - inputUsdPerMillion
        - outputUsdPerMillion
        - enabled
        - expectedVersion
      properties:
        defaultReasoningEffort:
          $ref: "#/components/schemas/ReasoningEffort"
        maximumReasoningEffort:
          $ref: "#/components/schemas/ReasoningEffort"
        inputUsdPerMillion:
          type: number
          minimum: 0
        outputUsdPerMillion:
          type: number
          minimum: 0
        enabled:
          type: boolean
        expectedVersion:
          type: integer
          format: int64
          minimum: 0
    ReasoningEffort:
      type: string
      enum:
        - PROVIDER_DEFAULT
        - NONE
        - MINIMAL
        - LOW
        - MEDIUM
        - HIGH
        - XHIGH
        - MAX
    RuntimeSecretPutRequest:
      type: object
