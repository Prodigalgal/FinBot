openapi: 3.1.0
info:
  title: FinBot Administrator Control Plane API
  version: 2.0.0
  description: Authenticated Java control-plane contract for research, workflows, diagnostics, and paper-trading audit.
servers:
  - url: /api/v2
security:
  - adminSession: []
  - adminApiToken: []
paths:
  /agent-roles:
    get:
      operationId: getAgentRoles
      responses:
        "200":
          description: Successful AgentRole[] response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentRole"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: AgentRole[]
      x-finbot-java-response-type: List<RoleResponse>
    post:
      operationId: postAgentRoles
      responses:
        "200":
          description: Successful AgentRole response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRole"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: AgentRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRoleMutation"
      x-finbot-java-response-type: RoleResponse
      x-finbot-java-request-type: SaveRoleRequest
  /agent-roles/{roleTemplateId}:
    delete:
      operationId: deleteAgentRolesRoleTemplateId
      responses:
        "204":
          description: Operation completed without a response body.
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: roleTemplateId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: void
      x-finbot-java-response-type: void
    put:
      operationId: putAgentRolesRoleTemplateId
      responses:
        "200":
          description: Successful AgentRole response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRole"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: roleTemplateId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: AgentRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRoleMutation"
      x-finbot-java-response-type: RoleResponse
      x-finbot-java-request-type: SaveRoleRequest
  /ai-experiments:
    get:
      operationId: listAiExperiments
      responses:
        "200":
          description: Successful AiExperiment[] response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiExperiment"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: AiExperiment[]
      x-finbot-java-response-type: List<AiExperiment>
    post:
      operationId: createAiExperiment
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "201":
          description: Successful AiExperiment response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiExperiment"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: AiExperiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiExperimentMutation"
      x-finbot-java-response-type: AiExperiment
      x-finbot-java-request-type: SaveRequest
  /ai-experiments/{experimentId}:
    put:
      operationId: putAiExperimentsExperimentId
      responses:
        "200":
          description: Successful AiExperiment response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiExperiment"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: experimentId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: AiExperiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiExperimentMutation"
      x-finbot-java-response-type: AiExperiment
      x-finbot-java-request-type: SaveRequest
  /analysis/forecasts:
    get:
      operationId: listResearchForecasts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Successful ResearchForecast[] response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResearchForecast"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: ResearchForecast[]
      x-finbot-java-response-type: List<ForecastResponse>
  /analysis/market-runs:
    post:
      operationId: startMarketAnalysis
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketAnalysisCommand"
      responses:
        "202":
          description: Successful ResearchLaunch response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchLaunch"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: ResearchLaunch
      x-finbot-java-response-type: CompletionStage<ResponseEntity<InstantResearchResponse>>
      x-finbot-java-request-type: MarketAnalysisRequest
  /analysis/market-runs/{runId}/forecast:
    get:
      operationId: getResearchForecast
      parameters:
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Successful ResearchForecast response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchForecast"
        "404":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: ResearchForecast
      x-finbot-java-response-type: ForecastResponse
  /api-tokens:
    get:
      operationId: listAdminApiTokens
      responses:
        "200":
          description: Successful AdminApiToken[] response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminApiToken"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: AdminApiToken[]
      x-finbot-java-response-type: List<AdminApiTokenResponse>
    post:
      operationId: createAdminApiToken
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdminApiTokenRequest"
      responses:
        "201":
          description: Successful CreatedAdminApiToken response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedAdminApiToken"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: CreatedAdminApiToken
      x-finbot-java-response-type: ResponseEntity<CreatedAdminApiTokenResponse>
      x-finbot-java-request-type: CreateAdminApiTokenRequest
  /api-tokens/{tokenId}:
    delete:
      operationId: revokeAdminApiToken
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
            pattern: ^apitoken_[a-z0-9_-]{4,71}$
        - $ref: "#/components/parameters/ExpectedVersion"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "204":
          description: Token revoked.
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: void
      x-finbot-java-response-type: void
  /auth/challenge:
    get:
      operationId: getAuthChallenge
      responses:
        "200":
          description: Successful AuthChallenge response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthChallenge"
        default:
          $ref: "#/components/responses/Problem"
      security: []
      x-finbot-web-response-type: AuthChallenge
      x-finbot-java-response-type: AuthChallengeResponse
  /auth/login:
    post:
      operationId: postAuthLogin
      responses:
        "200":
          description: Successful AuthStatus response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      security: []
      x-finbot-web-response-type: AuthStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      x-finbot-java-response-type: ResponseEntity<AuthStatusResponse>
      x-finbot-java-request-type: LoginRequest
  /auth/logout:
    post:
      operationId: postAuthLogout
      responses:
        "200":
          description: Successful AuthStatus response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: AuthStatus
      x-finbot-java-response-type: ResponseEntity<AuthStatusResponse>
  /auth/status:
    get:
      operationId: getAuthStatus
      responses:
        "200":
          description: Successful AuthStatus response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: AuthStatus
      x-finbot-java-response-type: AuthStatusResponse
  /autonomous:
    get:
      operationId: getAutonomousResearchStatus
      responses:
        "200":
          description: Successful AutonomousStatus response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutonomousStatus"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: AutonomousStatus
      x-finbot-java-response-type: StatusResponse
  /autonomous/runs:
    post:
      operationId: triggerAutonomousResearch
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                requestSummary:
                  type:
                    - string
                    - "null"
                  maxLength: 1000
      responses:
        "202":
          description: Successful TaskRecord response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskRecord"
        "409":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: TaskRecord
      x-finbot-java-response-type: ResponseEntity<TaskResponse>
      x-finbot-java-request-type: TriggerRequest
  /configuration:
    get:
      operationId: getConfiguration
      responses:
        "200":
          description: Successful ConfigurationSnapshot response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigurationSnapshot"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: ConfigurationSnapshot
      x-finbot-java-response-type: ConfigurationSnapshot
  /configuration/models:
    post:
      operationId: postConfigurationModels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAiModelRequest"
      responses:
        "201":
          description: Successful AiModel response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiModel"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: AiModel
      x-finbot-java-response-type: AiModelProfile
      x-finbot-java-request-type: CreateModelRequest
  /configuration/models/{modelProfileId}:
    put:
      operationId: putConfigurationModelsModelProfileId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAiModelRequest"
      responses:
        "200":
          description: Successful AiModel response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiModel"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: modelProfileId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: AiModel
      x-finbot-java-response-type: AiModelProfile
      x-finbot-java-request-type: UpdateModelRequest
  /configuration/providers:
    post:
      operationId: postConfigurationProviders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAiProviderRequest"
      responses:
        "201":
          description: Successful AiProvider response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiProvider"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: AiProvider
      x-finbot-java-response-type: AiProviderView
      x-finbot-java-request-type: CreateProviderRequest
  /configuration/providers/{profileId}:
    delete:
      operationId: deleteConfigurationProvidersProfileId
      responses:
        "204":
          description: Operation completed without a response body.
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
        - name: expectedVersion
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 0
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: void
      x-finbot-java-response-type: void
    put:
      operationId: putConfigurationProvidersProfileId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAiProviderRequest"
      responses:
        "200":
          description: Successful AiProvider response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiProvider"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: AiProvider
      x-finbot-java-response-type: AiProviderView
      x-finbot-java-request-type: UpdateProviderRequest
  /configuration/providers/{profileId}/probe:
    post:
      operationId: postConfigurationProvidersProfileIdProbe
      responses:
        "200":
          description: Successful ProviderModelCatalog response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderModelCatalog"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: ProviderModelCatalog
      x-finbot-java-response-type: ProviderModelCatalog
  /configuration/providers/probe:
    post:
      operationId: postConfigurationProvidersProbe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProbeAiProviderRequest"
      responses:
        "200":
          description: Successful ProviderModelCatalog response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderModelCatalog"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: ProviderModelCatalog
      x-finbot-java-response-type: ProviderModelCatalog
      x-finbot-java-request-type: ProbeProviderRequest
  /configuration/settings/{settingKey}:
    put:
      operationId: putConfigurationSettingsSettingKey
      responses:
        "200":
          description: Successful SystemSetting response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSetting"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: settingKey
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: SystemSetting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingRequest"
      x-finbot-java-response-type: SystemSetting
      x-finbot-java-request-type: UpdateSettingRequest
  /crawler/header-profiles:
    get:
      operationId: getCrawlerHeaderProfiles
      responses:
        "200":
          description: Successful CrawlerHeaderProfile[] response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrawlerHeaderProfile"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: CrawlerHeaderProfile[]
      x-finbot-java-response-type: List<CrawlerHeaderProfileResponse>
    post:
      operationId: createCrawlerHeaderProfile
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrawlerHeaderProfileMutationRequest"
      responses:
        "201":
          description: Successful CrawlerHeaderProfile response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrawlerHeaderProfile"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: CrawlerHeaderProfile
      x-finbot-java-response-type: CrawlerHeaderProfileResponse
      x-finbot-java-request-type: CrawlerHeaderProfileMutationRequest
  /crawler/header-profiles/{profileId}:
    delete:
      operationId: deleteCrawlerHeaderProfile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: ^header_[a-z0-9_-]{4,72}$
        - $ref: "#/components/parameters/ExpectedVersion"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "204":
          description: Crawler header profile archived
        "409":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: void
      x-finbot-java-response-type: void
    put:
      operationId: updateCrawlerHeaderProfile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: ^header_[a-z0-9_-]{4,72}$
        - $ref: "#/components/parameters/ExpectedVersion"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrawlerHeaderProfileMutationRequest"
      responses:
        "200":
          description: Successful CrawlerHeaderProfile response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrawlerHeaderProfile"
        "409":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: CrawlerHeaderProfile
      x-finbot-java-response-type: CrawlerHeaderProfileResponse
      x-finbot-java-request-type: CrawlerHeaderProfileMutationRequest
  /evidence/documents:
    get:
      operationId: getEvidenceDocuments
      responses:
        "200":
          description: Successful EvidenceDocument[] response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EvidenceDocument"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: EvidenceDocument[]
      x-finbot-java-response-type: List<DocumentResponse>
  /exchanges/capabilities:
    get:
      operationId: listExchangeCapabilities
      description: Exact market-data and paper-order environments supported by each venue market type.
      responses:
        "200":
          description: Exchange capability matrix. LIVE never appears in orderExecutionEnvironments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExchangeCapability"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-java-response-type: List<ExchangeCapability>
  /ingestion/workspace:
    get:
      operationId: getIngestionWorkspace
      responses:
        "200":
          description: Successful IngestionWorkspace response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionWorkspace"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: IngestionWorkspace
      x-finbot-java-response-type: IngestionWorkspace
  /network:
    get:
      operationId: getNetwork
      responses:
        "200":
          description: Successful NetworkWorkspace response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkWorkspace"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: NetworkWorkspace
      x-finbot-java-response-type: NetworkWorkspace
  /network/diagnostics:
    get:
      operationId: listNetworkDiagnostics
      responses:
        "200":
          description: Successful NetworkDiagnostic[] response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NetworkDiagnostic"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: NetworkDiagnostic[]
      x-finbot-java-response-type: List<NetworkDiagnostic>
    post:
      operationId: startNetworkDiagnostics
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                routes:
                  type: array
                  uniqueItems: true
                  items:
                    type: string
                    enum:
                      - FIRECRAWL
                      - WEB_CRAWL
                      - EXCHANGE_GATE
                      - EXCHANGE_BYBIT
                      - PUBLIC_DATA
      responses:
        "202":
          description: Successful NetworkDiagnostic[] response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NetworkDiagnostic"
        default:
          $ref: "#/components/responses/Problem"
      x-finbot-web-response-type: NetworkDiagnostic[]
      x-finbot-java-response-type: ResponseEntity<List<NetworkDiagnostic>>
      x-finbot-java-request-type: StartRequest
  /network/proxy-gateways/{gatewayId}:
    get:
      operationId: getNetworkProxyGatewayRuntimeStatus
      responses:
        "200":
          description: Successful ProxyGatewayRuntimeStatus response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyGatewayRuntimeStatus"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: gatewayId
          in: path
          required: true
          schema:
            type: string
      x-finbot-web-response-type: ProxyGatewayRuntimeStatus
      x-finbot-java-response-type: CompletionStage<ProxyGatewayRuntimeStatus>
    put:
      operationId: putNetworkProxyGatewaysGatewayId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyGatewayUpdateRequest"
      responses:
        "200":
          description: Successful ProxyGatewayProfile response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyGatewayProfile"
        default:
          $ref: "#/components/responses/Problem"
      parameters:
        - name: gatewayId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CsrfToken"
      x-finbot-web-response-type: ProxyGatewayProfile
      x-finbot-java-response-type: ProxyGatewayProfile
      x-finbot-java-request-type: UpdateRequest
  /network/proxy-gateways/{gatewayId}/reload:
    post:
      operationId: postNetworkProxyGatewaysGatewayIdReload
