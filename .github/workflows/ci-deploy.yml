name: FinBot Core CI and ArgoCD deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "services/proxy-gateway/**"
      - ".github/workflows/proxy-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: finbot-core-production
  cancel-in-progress: false

env:
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  verify:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: finbot
          POSTGRES_USER: finbot
          POSTGRES_PASSWORD: ci-database-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finbot -d finbot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"
      - uses: gradle/actions/setup-gradle@v4
      - name: Java clean build and PostgreSQL integration tests
        working-directory: services/backend
        env:
          FINBOT_TEST_DATABASE_URL: jdbc:postgresql://127.0.0.1:5432/finbot
          FINBOT_TEST_DATABASE_USERNAME: finbot
          FINBOT_TEST_DATABASE_PASSWORD: ci-database-password
        run: ./gradlew --no-daemon clean test :finbot-bootstrap:bootJar :finbot-migration:bootJar

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/quant/pyproject.toml
      - name: Install typed Python services
        run: python -m pip install './services/quant[dev]'
      - name: Quant service quality gates
        working-directory: services/quant
        run: |
          python -m ruff check src tests
          python -m mypy src tests
          python -m pytest -q
          python -m openapi_spec_validator ../../contracts/quant-research.openapi.yaml
          python -m openapi_spec_validator ../../contracts/finbot-control-plane.openapi.yaml
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend dependencies
        working-directory: apps/web
        run: |
          for attempt in 1 2 3; do
            npm ci --prefer-offline --no-audit && break
            if [ "$attempt" = 3 ]; then exit 1; fi
            sleep $((attempt * 5))
          done
      - name: Frontend contract and type checks
        working-directory: apps/web
        run: |
          npx tsc -b --clean
          npm run contract:check
      - name: Frontend component tests
        working-directory: apps/web
        run: |
          npm test
      - name: Frontend production build
        working-directory: apps/web
        run: |
          npm run build
      - name: Frontend dependency audit
        working-directory: apps/web
        run: |
          for attempt in 1 2 3; do
            npm audit --audit-level=high --registry=https://registry.npmjs.org && break
            if [ "$attempt" = 3 ]; then exit 1; fi
            sleep $((attempt * 5))
          done

      - name: Repository secret scan
        run: python scripts/secret_scan.py
      - name: Validate SearXNG runtime configuration
        run: |
          searxng_image="$(python - <<'PY'
          from pathlib import Path
          import yaml

          documents = list(yaml.safe_load_all(Path("platform/k8s/base/searxng.yaml").read_text()))
          config = next(document for document in documents if document["kind"] == "ConfigMap")
          deployment = next(document for document in documents if document["kind"] == "Deployment")
          Path("/tmp/finbot-searxng-settings.yml").write_text(
              config["data"]["settings.yml"], encoding="utf-8"
          )
          print(deployment["spec"]["template"]["spec"]["containers"][0]["image"])
          PY
          )"
          docker run --detach --rm \
            --name finbot-searxng-config-check \
            --publish 127.0.0.1:18080:8080 \
            --env SEARXNG_SECRET=ci-searxng-secret-at-least-thirty-two-characters \
            --volume /tmp/finbot-searxng-settings.yml:/etc/searxng/settings.yml:ro \
            "$searxng_image"
          trap 'docker logs finbot-searxng-config-check || true; docker rm --force finbot-searxng-config-check 2>/dev/null || true' EXIT
          for attempt in {1..40}; do
            if curl --fail --silent --header 'X-Forwarded-For: 127.0.0.1' \
              http://127.0.0.1:18080/healthz >/dev/null; then
              exit 0
            fi
            if [ "$attempt" = 40 ]; then
              exit 1
            fi
            sleep 1
          done
      - uses: imranismail/setup-kustomize@v2
      - name: Render production Kubernetes manifests
        run: |
          kustomize build platform/k8s/oracle >/tmp/finbot-rendered.yaml
          test -s /tmp/finbot-rendered.yaml
          ! grep -q 'python -m finbot.cli.serve_' /tmp/finbot-rendered.yaml
          ! grep -q '/api/v1/' /tmp/finbot-rendered.yaml
          python - <<'PY'
          from pathlib import Path
          import yaml

          resources = list(yaml.safe_load_all(Path("/tmp/finbot-rendered.yaml").read_text()))
          policies = {
              resource["metadata"]["name"]: resource
              for resource in resources
              if resource and resource.get("kind") == "NetworkPolicy"
          }

          def ingress_allows(policy_name: str, source_name: str, port: int) -> bool:
              for rule in policies[policy_name]["spec"].get("ingress", []):
                  sources = rule.get("from", [])
                  ports = rule.get("ports", [])
                  source_matches = any(
                      source.get("podSelector", {}).get("matchLabels", {}).get(
                          "app.kubernetes.io/name"
                      ) == source_name
                      for source in sources
                  )
                  if source_matches and any(value.get("port") == port for value in ports):
                      return True
              return False

          assert ingress_allows("finbot-proxy-gateways", "finbot-searxng", 8080)
          assert not ingress_allows("finbot-quant", "finbot-searxng", 8080)
          PY

      - name: Install browser runtime
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Java, quant and React end-to-end smoke
        env:
          FINBOT_DATABASE_URL: jdbc:postgresql://127.0.0.1:5432/finbot
          FINBOT_DATABASE_USERNAME: finbot
          FINBOT_DATABASE_PASSWORD: ci-database-password
          FINBOT_ADMIN_USERNAME: admin
          FINBOT_ADMIN_PASSWORD: ci-admin-password
          FINBOT_AUTH_SECURE_COOKIE: "false"
          FINBOT_JAVA_SERVICE_TOKEN: ci-java-service-token-at-least-thirty-two-characters
          FINBOT_QUANT_SERVICE_TOKEN: ci-quant-service-token-at-least-thirty-two-characters
          FINBOT_RUNTIME_SECRET_MASTER_KEY: Y2ktcnVudGltZS1zZWNyZXQtbWFzdGVyLWtleS0wMDE=
          FINBOT_AI_PROVIDER_KEYS_JSON: '{"provider_mimo_default":"ci-not-used","provider_deepseek_default":"ci-not-used","provider_sub2api_default":"ci-not-used","provider_gemini_default":"ci-not-used","provider_grok_sub2api":"ci-not-used"}'
          FINBOT_EXCHANGE_ACCOUNT_CREDENTIALS_JSON: '{"account_gate_testnet_default":{"API_KEY":"ci-not-used","API_SECRET":"ci-not-used"},"account_bybit_demo_default":{"API_KEY":"ci-not-used","API_SECRET":"ci-not-used"}}'
          FINBOT_INFORMATION_SOURCE_KEYS_JSON: '{}'
          FINBOT_PROXY_ROUTE_URLS_JSON: '{"WEB_CRAWL":"http://127.0.0.1:9999","FIRECRAWL":"http://127.0.0.1:9999","EXCHANGE_GATE":"http://127.0.0.1:9999","EXCHANGE_BYBIT":"http://127.0.0.1:9999"}'
          FINBOT_PROXY_GATEWAY_SECRETS_JSON: '{}'
          FINBOT_SUB2API_BASE_URL: https://example.invalid/v1
          FINBOT_URL: http://127.0.0.1:4173
        run: |
          mkdir -p tmp/ci-smoke
          python -m finbot_quant.main >tmp/ci-smoke/quant.log 2>&1 &
          quant_pid=$!
          java -jar services/backend/finbot-bootstrap/build/libs/finbot-bootstrap-2.0.0-SNAPSHOT.jar >tmp/ci-smoke/backend.log 2>&1 &
          backend_pid=$!
          npm --prefix apps/web run preview -- --host 127.0.0.1 >tmp/ci-smoke/web.log 2>&1 &
          web_pid=$!
          trap 'kill "$quant_pid" "$backend_pid" "$web_pid" 2>/dev/null || true' EXIT
          for attempt in {1..90}; do
            if curl --fail --silent http://127.0.0.1:8080/actuator/health/readiness >/dev/null \
              && curl --fail --silent http://127.0.0.1:8081/internal/v1/health >/dev/null \
              && curl --fail --silent http://127.0.0.1:4173/ >/dev/null; then
              break
            fi
            if [ "$attempt" = 90 ]; then
              cat tmp/ci-smoke/backend.log tmp/ci-smoke/quant.log tmp/ci-smoke/web.log
              exit 1
            fi
            sleep 1
          done
          npm --prefix apps/web run smoke:system
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: finbot-verification-evidence
          path: |
            output/playwright/
            tmp/ci-smoke/*.log
            services/backend/**/build/test-results/test/*.xml
          if-no-files-found: ignore
          retention-days: 14

  build-core-images:
    needs: verify
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            image: speedproxy/finbot-backend
            context: .
            dockerfile: services/backend/Dockerfile
            no_cache: false
          - component: quant
            image: speedproxy/finbot-quant
            context: services/quant
            dockerfile: services/quant/Dockerfile
            no_cache: false
          - component: web
            image: speedproxy/finbot-web
            context: apps/web
            dockerfile: apps/web/Dockerfile
            no_cache: true
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: docker.io/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          no-cache: ${{ matrix.no_cache }}
          provenance: mode=max
          sbom: true
      - name: Scan published image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: docker.io/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          trivy-config: .trivy.yaml
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - uses: sigstore/cosign-installer@v3.10.1
      - name: Keyless sign image
        run: cosign sign --yes docker.io/${{ matrix.image }}:${IMAGE_TAG}

  update-gitops:
    needs: build-core-images
    runs-on: ubuntu-24.04
    concurrency:
      group: finbot-gitops-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Prodigalgal/ircs-prod-config
          ssh-key: ${{ secrets.FINBOT_GITOPS_DEPLOY_KEY }}
          path: gitops
      - uses: imranismail/setup-kustomize@v2
      - name: Preserve independently released proxy image
        id: current-proxy
        working-directory: gitops
        run: |
          proxy_image=$(ruby -ryaml -e '
            document = YAML.safe_load(File.read("finbot/oracle/kustomization.yaml"), aliases: true)
            entry = document.fetch("images").find { |candidate| candidate["name"] == "ghcr.io/example/finbot-proxy" }
            abort "GitOps proxy image pin is missing" unless entry && entry["newName"] && entry["newTag"]
            puts [entry.fetch("newName"), entry.fetch("newTag")].join(":")')
          echo "image=${proxy_image}" >> "$GITHUB_OUTPUT"
      - name: Update ArgoCD source of truth
        run: |
          rsync -a --delete platform/k8s/base/ gitops/finbot/base/
          rsync -a --delete platform/k8s/oracle/ gitops/finbot/oracle/
          cd gitops/finbot/oracle
          kustomize edit set image \
            ghcr.io/example/finbot-backend=docker.io/speedproxy/finbot-backend:${IMAGE_TAG} \
            ghcr.io/example/finbot-quant=docker.io/speedproxy/finbot-quant:${IMAGE_TAG} \
            ghcr.io/example/finbot-web=docker.io/speedproxy/finbot-web:${IMAGE_TAG} \
            ghcr.io/example/finbot-proxy=${{ steps.current-proxy.outputs.image }}
          kustomize build . >/tmp/finbot-rendered.yaml
      - name: Commit GitOps revision
        working-directory: gitops
        run: |
          if git diff --quiet; then
            echo "GitOps is already current"
            exit 0
          fi
          git config user.name "finbot-ci"
          git config user.email "finbot-ci@users.noreply.github.com"
          git add finbot
          git commit -m "deploy(finbot): ${IMAGE_TAG}"
          git push origin main
