name: FinBot CI and ArgoCD deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: finbot-production
  cancel-in-progress: false

env:
  IMAGE_NAME: speedproxy/finbot
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend
        run: python -m pip install .
      - name: Secret scan
        run: python scripts/secret_scan.py
      - name: Backend tests
        run: |
          python -m compileall finbot
          python -m unittest discover -s tests -v
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-ui/package-lock.json
      - name: Frontend clean build and audit
        working-directory: web-ui
        run: |
          npm ci
          npx tsc -b --clean
          npm run build
          npm audit --audit-level=high
      - name: Install browser runtime
        working-directory: web-ui
        run: npx playwright install --with-deps chromium
      - name: Single-admin auth and quant component smoke
        env:
          FINBOT_URL: http://127.0.0.1:8790
          FINBOT_AUTH_ENABLED: "true"
          FINBOT_ADMIN_USERNAME: admin
          FINBOT_ADMIN_PASSWORD: ci-test-passphrase
          FINBOT_SESSION_SECRET: ci-session-secret-with-at-least-32-characters
          FINBOT_AUTH_COOKIE_SECURE: "false"
          FINBOT_AUTH_TRUSTED_ORIGINS: http://127.0.0.1:8790
          FINBOT_AUTH_POW_DIFFICULTY_BITS: "16"
        run: |
          mkdir -p tmp/ci-auth-smoke
          python -m finbot.cli.serve_web \
            --data-dir tmp/ci-auth-smoke/data \
            --host 127.0.0.1 \
            --port 8790 \
            --frontend-dist web-ui/dist > tmp/ci-auth-smoke/server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8790/health/ready >/dev/null; then break; fi
            if [ "$attempt" = 60 ]; then cat tmp/ci-auth-smoke/server.log; exit 1; fi
            sleep 1
          done
          npm --prefix web-ui run smoke:production-quant
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: finbot-browser-smoke
          path: |
            output/playwright/
            tmp/ci-auth-smoke/server.log
          if-no-files-found: ignore
          retention-days: 14

  build-and-update-gitops:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - uses: actions/checkout@v4
        with:
          repository: Prodigalgal/ircs-prod-config
          ssh-key: ${{ secrets.FINBOT_GITOPS_DEPLOY_KEY }}
          path: gitops
      - uses: imranismail/setup-kustomize@v2
      - name: Update ArgoCD source of truth
        run: |
          rsync -a --delete deploy/k8s/base/ gitops/finbot/base/
          rsync -a --delete deploy/k8s/oracle/ gitops/finbot/oracle/
          cd gitops/finbot/oracle
          kustomize edit set image ghcr.io/example/finbot=${IMAGE_NAME}:${IMAGE_TAG}
      - name: Commit GitOps revision
        working-directory: gitops
        run: |
          if git diff --quiet; then
            echo "GitOps is already current"
            exit 0
          fi
          git config user.name "finbot-ci"
          git config user.email "finbot-ci@users.noreply.github.com"
          git add finbot
          git commit -m "deploy(finbot): ${IMAGE_TAG}"
          git push origin main
