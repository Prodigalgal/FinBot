name: FinBot Proxy CI and ArgoCD deploy

on:
  push:
    branches: [main]
    paths:
      - "services/proxy-gateway/**"
      - ".trivy.yaml"
      - ".github/workflows/proxy-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: finbot-proxy-production
  cancel-in-progress: false

env:
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  verify-proxy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/proxy-gateway/pyproject.toml
      - name: Install typed proxy service
        run: python -m pip install './services/proxy-gateway[dev]'
      - name: Proxy quality gates
        working-directory: services/proxy-gateway
        run: |
          python -m ruff check src tests
          python -m mypy src tests
          python -m pytest -q
      - name: Repository secret scan
        run: python scripts/secret_scan.py

  build-proxy-image:
    needs: verify-proxy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/proxy-gateway
          file: services/proxy-gateway/Dockerfile
          platforms: linux/arm64
          push: true
          tags: docker.io/speedproxy/finbot-proxy:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,mode=max,scope=proxy
          provenance: mode=max
          sbom: true
      - name: Scan published image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: docker.io/speedproxy/finbot-proxy:${{ env.IMAGE_TAG }}
          trivy-config: .trivy.yaml
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - uses: sigstore/cosign-installer@v3.10.1
      - name: Keyless sign image
        run: cosign sign --yes docker.io/speedproxy/finbot-proxy:${IMAGE_TAG}

  update-proxy-gitops:
    needs: build-proxy-image
    runs-on: ubuntu-24.04
    concurrency:
      group: finbot-gitops-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Prodigalgal/ircs-prod-config
          ssh-key: ${{ secrets.FINBOT_GITOPS_DEPLOY_KEY }}
          path: gitops
      - uses: imranismail/setup-kustomize@v2
      - name: Update proxy image pin
        run: |
          cd gitops/finbot/oracle
          kustomize edit set image \
            ghcr.io/example/finbot-proxy=docker.io/speedproxy/finbot-proxy:${IMAGE_TAG}
          kustomize build . >/tmp/finbot-rendered.yaml
      - name: Commit GitOps revision
        working-directory: gitops
        run: |
          if git diff --quiet; then
            echo "Proxy GitOps image is already current"
            exit 0
          fi
          git config user.name "finbot-ci"
          git config user.email "finbot-ci@users.noreply.github.com"
          git add finbot/oracle/kustomization.yaml
          git commit -m "deploy(finbot-proxy): ${IMAGE_TAG}"
          git push origin main
